# ============================================================================
# Workflow 2 — Terraform Plan (Pull Request)
#
# Triggered when a PR targets `main`.  Generates a Terraform plan and posts
# the full output as a collapsible PR comment so asset owners can review all
# proposed infrastructure changes before they approve the PR.
#
# Secret management strategy
# ──────────────────────────
# 1. OIDC (Workload Identity Federation) is used to authenticate to Azure —
#    no long-lived client secret is stored in GitHub.
# 2. All Terraform service-principal credentials are fetched at runtime from
#    Azure Key Vault using the az CLI.
# 3. Every secret value is immediately masked with `::add-mask::` before
#    being written to $GITHUB_ENV, preventing exposure in any log line.
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID        — client ID of the OIDC-enabled service principal
#   AZURE_TENANT_ID        — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID  — Azure subscription ID
#   AZURE_KEYVAULT_NAME    — name of the Key Vault holding TF credentials
#
# Required Azure Key Vault secrets:
#   ARM-CLIENT-ID          — Terraform service principal client ID
#   ARM-CLIENT-SECRET      — Terraform service principal secret
#   ARM-TENANT-ID          — Terraform tenant ID
#   ARM-SUBSCRIPTION-ID    — Terraform subscription ID
# ============================================================================

name: "2 · Plan (PR)"

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# OIDC token issuance + PR comment posting require these permissions.
permissions:
  id-token: write      # issue OIDC token for azure/login
  contents: read
  pull-requests: write # post plan as PR comment

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false  # disabled so raw exit codes are captured

      # ── Azure login via OIDC ──────────────────────────────────────────────
      # No client secret is required.  A short-lived JWT is exchanged for an
      # Azure access token automatically by the action.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Fetch Terraform credentials from Key Vault ────────────────────────
      # The fetch_and_mask helper:
      #   1. Retrieves the secret value via az CLI
      #   2. Immediately registers it as a masked value (::add-mask::)
      #   3. Writes it to $GITHUB_ENV for subsequent steps
      # The secret value will appear as *** in all future log output.
      - name: Fetch Terraform credentials from Key Vault
        run: |
          fetch_and_mask() {
            local kv_secret="$1"
            local env_var="$2"
            local value
            value=$(az keyvault secret show \
              --vault-name "${{ secrets.AZURE_KEYVAULT_NAME }}" \
              --name  "$kv_secret" \
              --query value \
              --output tsv)
            echo "::add-mask::$value"
            echo "${env_var}=${value}" >> "$GITHUB_ENV"
          }

          fetch_and_mask "ARM-CLIENT-ID"      "ARM_CLIENT_ID"
          fetch_and_mask "ARM-CLIENT-SECRET"  "ARM_CLIENT_SECRET"
          fetch_and_mask "ARM-TENANT-ID"      "ARM_TENANT_ID"
          fetch_and_mask "ARM-SUBSCRIPTION-ID" "ARM_SUBSCRIPTION_ID"

      - name: Terraform Init
        run: terraform init

      # ── Plan ─────────────────────────────────────────────────────────────
      # -detailed-exitcode returns:
      #   0 → success, no changes
      #   1 → error
      #   2 → success, changes present
      # continue-on-error: true lets the comment step run even when plan fails.
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan \
            -no-color \
            -detailed-exitcode \
            -out="${{ github.workspace }}/tfplan" \
            2>&1 | tee "${{ github.workspace }}/plan.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e
        continue-on-error: true

      # ── Post plan as PR comment ───────────────────────────────────────────
      # Deletes any previous plan comment from this workflow before posting a
      # fresh one, keeping the PR thread tidy across multiple pushes.
      - name: Post plan to PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            const planText = fs.readFileSync(
              path.join(process.env.GITHUB_WORKSPACE, 'plan.txt'), 'utf8'
            );

            // Truncate to GitHub's 65 536-character body limit.
            const MAX  = 65000;
            const text = planText.length > MAX
              ? planText.substring(0, MAX) + '\n\n… (truncated — see full log)'
              : planText;

            const code     = '${{ steps.plan.outputs.exit_code }}';
            const statusOf = { '0': '✅ No changes', '1': '❌ Plan failed', '2': '⚠️ Changes detected' };
            const status   = statusOf[code] ?? `Exit ${code}`;

            const body = [
              `## Terraform Plan — ${status}`,
              '',
              '<details><summary>Click to expand plan output</summary>',
              '',
              '```hcl',
              text,
              '```',
              '</details>',
              '',
              `> Workflow \`${{ github.workflow }}\` · [Run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            // Remove stale plan comments so only the latest is visible.
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.startsWith('## Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::Terraform plan exited with an error. Review the output above."
          exit 1
