# ============================================================================
# Workflow 2 — Terraform Plan (Pull Request)
#
# Triggered when a PR targets `main`.  Generates a Terraform plan and posts
# the full output as a collapsible PR comment so asset owners can review all
# proposed infrastructure changes before they approve the PR.
#
# Authentication strategy
# ────────────────────────
# Azure App Registration with Federated Identity Credentials (OIDC) is used
# for both the Azure CLI login and the Terraform azurerm provider.
# No client secrets are required, stored, or transmitted.
#
# How it works:
#   1. `id-token: write` permission lets GitHub issue a short-lived OIDC JWT.
#   2. azure/login@v2 exchanges the JWT for an Azure CLI access token.
#   3. The azurerm provider reads ARM_USE_OIDC=true and independently
#      exchanges its own OIDC token (via ACTIONS_ID_TOKEN_REQUEST_*) for
#      an Azure Resource Manager token — no Key Vault fetch required.
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID        — Application (client) ID of the App Registration
#   AZURE_TENANT_ID        — Azure AD / Entra ID tenant ID
#   AZURE_SUBSCRIPTION_ID  — Azure subscription ID
#   MYSQL_ADMIN_PASSWORD   — MySQL administrator password (sensitive)
#
# Azure prerequisites:
#   - App Registration with a Federated Credential for this repo + branch/PR
#   - Contributor (or scoped) role assigned on the target subscription/RG
# ============================================================================

name: "2 · Plan (PR)"

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# OIDC token issuance + PR comment posting require these permissions.
permissions:
  id-token: write      # issue OIDC token for azure/login and azurerm provider
  contents: read
  pull-requests: write # post plan as PR comment

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    # ── Terraform ARM authentication via OIDC ────────────────────────────────
    # ARM_USE_OIDC instructs the azurerm provider to obtain a short-lived
    # access token via the GitHub OIDC endpoint instead of a client secret.
    # ACTIONS_ID_TOKEN_REQUEST_URL and ACTIONS_ID_TOKEN_REQUEST_TOKEN are
    # injected automatically by GitHub when id-token: write is set above.
    env:
      ARM_CLIENT_ID:              ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:              ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID:        ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:               "true"
      TF_VAR_mysql_admin_password: ${{ secrets.MYSQL_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false  # disabled so raw exit codes are captured

      # ── Azure CLI login via OIDC ──────────────────────────────────────────
      # Exchanges the short-lived GitHub OIDC JWT for an Azure CLI session.
      # No client secret is stored or transmitted.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Terraform-Modules-Internal

      - name: Configure Git credentials
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        run: terraform init

      # ── Plan ─────────────────────────────────────────────────────────────
      # -detailed-exitcode returns:
      #   0 → success, no changes
      #   1 → error
      #   2 → success, changes present
      # continue-on-error: true lets the comment step run even when plan fails.
      - name: Terraform Plan
        id: plan
        timeout-minutes: 10
        run: |
          set +e
          terraform plan \
            -no-color \
            -detailed-exitcode \
            -lock-timeout=60s \
            -out="${{ github.workspace }}/tfplan" \
            2>&1 | tee "${{ github.workspace }}/plan.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e
        continue-on-error: true

      # ── Post plan as PR comment ───────────────────────────────────────────
      # Deletes any previous plan comment from this workflow before posting a
      # fresh one, keeping the PR thread tidy across multiple pushes.
      - name: Post plan to PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            const planText = fs.readFileSync(
              path.join(process.env.GITHUB_WORKSPACE, 'plan.txt'), 'utf8'
            );

            // Truncate to GitHub's 65 536-character body limit.
            const MAX  = 65000;
            const text = planText.length > MAX
              ? planText.substring(0, MAX) + '\n\n… (truncated — see full log)'
              : planText;

            const code     = '${{ steps.plan.outputs.exit_code }}';
            const statusOf = { '0': '✅ No changes', '1': '❌ Plan failed', '2': '⚠️ Changes detected' };
            const status   = statusOf[code] ?? `Exit ${code}`;

            const body = [
              `## Terraform Plan — ${status}`,
              '',
              '<details><summary>Click to expand plan output</summary>',
              '',
              '```hcl',
              text,
              '```',
              '</details>',
              '',
              `> Workflow \`${{ github.workflow }}\` · [Run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            // Remove stale plan comments so only the latest is visible.
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.startsWith('## Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::Terraform plan exited with an error. Review the output above."
          exit 1
