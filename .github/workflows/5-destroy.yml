# ============================================================================
# Workflow 5 — Terraform Destroy (Manual)
#
# DESTRUCTIVE — permanently deletes all resources managed by this root module.
#
# This workflow is triggered exclusively via workflow_dispatch and requires
# the caller to type "destroy" in the confirmation input. Any other value
# causes the workflow to fail before touching infrastructure.
#
# How to trigger:
#   Actions → "5 · Destroy (Manual)" → Run workflow
#   → confirm: destroy  (must be typed exactly)
#
# Authentication strategy
# ────────────────────────
# Same OIDC pattern as workflows 2 and 3.
# Single Federated Identity Credential:
#   Entity type: Branch → subject: repo:<org>/<repo>:ref:refs/heads/main
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   GH_APP_ID, GH_APP_PRIVATE_KEY
#
# Concurrency
# ───────────
# A global destroy concurrency group prevents concurrent destroy runs.
# cancel-in-progress is false — interrupting a destroy risks orphaned resources.
# ============================================================================

name: "5 · Destroy (Manual)"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'destroy' to confirm permanent deletion of all resources"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-destroy
  cancel-in-progress: false  # never interrupt an in-progress destroy

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      # ── Safety guard ─────────────────────────────────────────────────────
      # Abort immediately if the confirmation input is not exactly "destroy".
      - name: Confirm destroy
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "::error::Confirmation must be exactly 'destroy'. Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "Destroy confirmed by ${{ github.actor }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id:   ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner:       Terraform-Modules-Internal

      - name: Configure Git credentials
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        run: terraform init

      # ── Destroy ──────────────────────────────────────────────────────────
      # -auto-approve is intentional: the explicit dispatch + confirmation
      # input above serve as the human gate.
      - name: Terraform Destroy
        timeout-minutes: 30
        run: |
          terraform destroy \
            -auto-approve \
            -no-color \
            -lock-timeout=60s

      - name: Publish destroy result to Step Summary
        if: always()
        run: |
          RESULT="${{ job.status }}"
          case "$RESULT" in
            success) ICON="✅" ;;
            failure) ICON="❌" ;;
            *)       ICON="⚠️" ;;
          esac

          {
            echo "## Terraform Destroy — ${ICON} ${RESULT^}"
            echo ""
            echo "| Field        | Value |"
            echo "|--------------|-------|"
            echo "| Triggered by | ${{ github.actor }} |"
            echo "| Commit       | \`${{ github.sha }}\` |"
            echo "| Ref          | \`${{ github.ref_name }}\` |"
            echo "| Run          | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
