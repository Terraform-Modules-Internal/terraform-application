# ============================================================================
# Workflow 1 — Terraform Format & Validate
#
# Triggered on every push that touches a .tf or .tfvars file (any branch).
# Provides fast feedback during feature development before a PR is opened.
#
# No Azure credentials are required:
#   - fmt only checks syntax/formatting
#   - validate runs with -backend=false so no state or provider auth is needed
# ============================================================================

name: "1 · Format & Validate"

on:
  push:
    branches-ignore:
    - main
    paths:
    - "**.tf"
    - "**.tfvars"
  workflow_dispatch:


jobs:
  # --------------------------------------------------------------------------
  # Enforce canonical HCL formatting across every .tf file in the repository.
  # --------------------------------------------------------------------------
  fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "~1.5"

    - name: terraform fmt
      # -check  → exit non-zero if any file is not formatted
      # -diff   → show which lines differ
      # -recursive → traverse all sub-directories
      run: terraform fmt -check -diff -recursive .

  # --------------------------------------------------------------------------
  # Initialise the root module and run terraform validate.
  # Connects to HCP Terraform for state backend — requires TF_API_TOKEN.
  # --------------------------------------------------------------------------
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_CLOUD_ORGANIZATION:     ${{ secrets.TF_CLOUD_ORGANIZATION }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "~1.5"

    - name: Generate GitHub App Token
      id: app-token
      uses: actions/create-github-app-token@v3.1.1
      with:
        client-id: ${{ secrets.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
        owner: Terraform-Modules-Internal

    - name: Configure Git credentials
      run: |
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

    - name: Terraform Init
      run: terraform init -upgrade

    - name: Terraform Validate
      run: terraform validate
