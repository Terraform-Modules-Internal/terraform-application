# ============================================================================
# Workflow 4 — Terraform Test (Pull Request)
#
# Triggered when a PR targets `main` and touches .tf, .tfvars, or test files.
# Runs `terraform test` against .tftest.hcl files (root and tests/ directory)
# and posts the full output as a collapsible PR comment.
#
# Designed for child module PRs to validate behaviour before merge, but also
# applied here to integration-test the root module's module composition.
#
# Authentication strategy
# ────────────────────────
# Same OIDC pattern as the plan workflow — no client secrets stored or
# transmitted. See Workflow 2 header for full explanation.
#
# Terraform version
# ─────────────────
# `terraform test` was introduced in 1.6.0. This workflow pins to ~1.6 to
# ensure the command is available while staying within the minor series.
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   GH_APP_ID, GH_APP_PRIVATE_KEY
# ============================================================================

name: "4 · Test (PR)"

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tfvars"
      - "tests/**"
      - "**/*.tftest.hcl"
  workflow_dispatch:

permissions:
  id-token: write      # issue OIDC token for azure/login and azurerm provider
  contents: read
  pull-requests: write # post test results as PR comment

jobs:
  tftest:
    name: Terraform Test
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      # ── Azure CLI login via OIDC ──────────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Private module access via GitHub App token ────────────────────────
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id:   ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner:       Terraform-Modules-Internal

      - name: Configure Git credentials
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        run: terraform init

      # ── Test ─────────────────────────────────────────────────────────────
      # Discovers and runs all *.tftest.hcl files in the root and tests/ dir.
      # timeout-minutes guards against hung provider calls.
      # continue-on-error allows the comment step to post even on failure.
      - name: Terraform Test
        id: test
        timeout-minutes: 30
        run: |
          set +e
          terraform test -no-color 2>&1 | tee "${{ github.workspace }}/test.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e
        continue-on-error: true

      # ── Post results as PR comment ────────────────────────────────────────
      # Replaces any previous test comment on this PR so the thread stays tidy.
      - name: Post test results to PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            const testText = fs.readFileSync(
              path.join(process.env.GITHUB_WORKSPACE, 'test.txt'), 'utf8'
            );

            const MAX  = 65000;
            const text = testText.length > MAX
              ? testText.substring(0, MAX) + '\n\n… (truncated — see full log)'
              : testText;

            const code     = '${{ steps.test.outputs.exit_code }}';
            const statusOf = { '0': '✅ All tests passed', '1': '❌ Tests failed' };
            const status   = statusOf[code] ?? `Exit ${code}`;

            const body = [
              `## Terraform Test — ${status}`,
              '',
              '<details><summary>Click to expand test output</summary>',
              '',
              '```',
              text,
              '```',
              '</details>',
              '',
              `> Workflow \`${{ github.workflow }}\` · [Run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            // Remove stale test comments so only the latest is visible.
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.startsWith('## Terraform Test')) {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if tests failed
        if: steps.test.outputs.exit_code != '0'
        run: |
          echo "::error::Terraform tests failed. Review the output above."
          exit 1
