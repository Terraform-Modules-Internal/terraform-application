# ============================================================================
# Workflow 3 — Terraform Apply (Post-merge to main)
#
# Pipeline shape
# ──────────────
#
#   On push to main (automatic):
#   ┌──────────────────┐
#   │   Job: plan      │  → posts plan to Step Summary, uploads artifact
#   │  (auto)          │    NO apply — human must review and re-dispatch
#   └──────────────────┘
#
#   On workflow_dispatch → action: apply (manual):
#   ┌──────────────────┐     tfplan artifact      ┌──────────────────────┐
#   │   Job: plan      │ ──────────────────────▶  │   Job: apply         │
#   │  (re-runs)       │                          │   (manual approval)  │
#   └──────────────────┘                          └──────────────────────┘
#
# Approval gate (without GitHub Environments)
# ────────────────────────────────────────────
# The apply job only runs when a human manually triggers this workflow via
# Actions → "Run workflow" and selects action: apply.
# This preserves a single Federated Identity Credential (subject:
# repo:<org>/<repo>:ref:refs/heads/main) covering both jobs — no
# environment-scoped FIC is required.
#
# How to approve and apply:
#   1. Review the plan in the Step Summary of the push-triggered run.
#   2. Go to Actions → "3 · Apply (main)" → Run workflow.
#   3. Select action: apply and click Run workflow.
#
# Authentication strategy
# ────────────────────────
# Azure App Registration with Federated Identity Credentials (OIDC).
# No client secrets are required, stored, or transmitted.
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   GH_APP_ID, GH_APP_PRIVATE_KEY
#
# Azure prerequisites:
#   - App Registration with ONE Federated Identity Credential:
#       Entity type: Branch → subject: repo:<org>/<repo>:ref:refs/heads/main
#       Covers both the plan and apply jobs.
#   - Contributor (or scoped) role on the target subscription/RG
#
# Concurrency
# ───────────
# A concurrency group prevents two apply runs from racing on the same branch.
# cancel-in-progress is false because interrupting a running apply could leave
# infrastructure in a partially-changed state.
# ============================================================================

name: "3 · Apply (main)"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform after plan"
        required: true
        default: plan-only
        type: choice
        options:
          - plan-only
          - apply

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false  # never interrupt an in-progress apply

# ============================================================================
# JOB 1 — plan
# Always runs. Generates the execution plan, publishes it to the Step Summary
# so the reviewer can read it before approving, and uploads the binary plan
# file as an artifact for the apply job (same run).
# ============================================================================
jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    outputs:
      exit_code: ${{ steps.plan.outputs.exit_code }}

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id:   ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner:       Terraform-Modules-Internal

      - name: Configure Git credentials
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        timeout-minutes: 10
        run: |
          set +e
          terraform plan \
            -no-color \
            -detailed-exitcode \
            -lock-timeout=60s \
            -out="${{ github.workspace }}/tfplan" \
            2>&1 | tee "${{ github.workspace }}/plan.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e
        continue-on-error: true

      # Publish the plan to the Step Summary so the reviewer can read it
      # before dispatching the apply action.
      - name: Publish plan to Step Summary
        run: |
          EXIT="${{ steps.plan.outputs.exit_code }}"
          case "$EXIT" in
            0) STATUS="✅ No changes — infrastructure is up to date" ;;
            1) STATUS="❌ Plan failed — review errors below"         ;;
            2) STATUS="⚠️  Changes detected — dispatch 'apply' to proceed" ;;
            *) STATUS="Exit code: $EXIT" ;;
          esac

          {
            echo "## Terraform Plan — ${STATUS}"
            echo ""
            echo "| Field  | Value |"
            echo "|--------|-------|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Actor  | ${{ github.actor }} |"
            echo "| Ref    | \`${{ github.ref_name }}\` |"
            echo ""
            echo "<details><summary>Full plan output</summary>"
            echo ""
            echo '```hcl'
            cat "${{ github.workspace }}/plan.txt"
            echo '```'
            echo "</details>"
            echo ""
            echo "> To apply: Actions → **3 · Apply (main)** → Run workflow → action: **apply**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        if: steps.plan.outputs.exit_code != '1'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: tfplan
          retention-days: 1

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::Terraform plan failed. The apply job will not run."
          exit 1

  # ============================================================================
  # JOB 2 — apply
  # Downloads the saved plan from the plan job (same run) and applies it.
  #
  # Only runs when:
  #   • This workflow was triggered via workflow_dispatch, AND
  #   • The 'action' input was set to 'apply', AND
  #   • The plan detected real changes (exit code 2)
  #
  # A human must explicitly dispatch with action: apply — providing the
  # manual approval gate without requiring a GitHub Environment FIC.
  # ============================================================================
  apply:
    name: Terraform Apply
    needs: plan
    if: |
      needs.plan.outputs.exit_code == '2' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id:   ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner:       Terraform-Modules-Internal

      - name: Configure Git credentials
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ github.workspace }}

      # The plan was reviewed and apply was manually dispatched — safe to auto-approve.
      - name: Terraform Apply
        run: terraform apply -auto-approve "${{ github.workspace }}/tfplan"

      - name: Publish apply result to Step Summary
        if: always()
        run: |
          RESULT="${{ job.status }}"
          case "$RESULT" in
            success) ICON="✅" ;;
            failure) ICON="❌" ;;
            *)       ICON="⚠️" ;;
          esac

          {
            echo "## Terraform Apply — ${ICON} ${RESULT^}"
            echo ""
            echo "| Field        | Value |"
            echo "|--------------|-------|"
            echo "| Commit       | \`${{ github.sha }}\` |"
            echo "| Approved by  | ${{ github.actor }} |"
            echo "| Run          | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
