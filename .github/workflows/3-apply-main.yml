# ============================================================================
# Workflow 3 — Terraform Apply / Destroy (main)
#
# Pipeline shape
# ──────────────
#
#   On push to main (automatic):
#   ┌───────────┐
#   │   plan    │  → posts plan to Step Summary. No apply — human dispatches.
#   └───────────┘
#
#   On workflow_dispatch → action: apply (manual approval):
#   ┌───────────┐     tfplan artifact     ┌───────────┐
#   │   plan    │ ──────────────────────▶ │   apply   │
#   └───────────┘                         └───────────┘
#
#   On workflow_dispatch → action: destroy (manual, destructive):
#   ┌─────────────┐
#   │   destroy   │  → confirmation guard → terraform destroy
#   └─────────────┘     (plan job is skipped)
#
# How to trigger apply:
#   1. Review the plan in the Step Summary of the push-triggered run.
#   2. Actions → "3 · Apply / Destroy (main)" → Run workflow
#   3. action: apply → Run workflow
#
# How to trigger destroy:
#   1. Actions → "3 · Apply / Destroy (main)" → Run workflow
#   2. action: destroy, confirm_destroy: destroy → Run workflow
#
# Authentication strategy
# ────────────────────────
# OIDC — no client secrets stored or transmitted.
# Single Federated Identity Credential required:
#   Entity type: Branch → subject: repo:<org>/<repo>:ref:refs/heads/main
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   GH_APP_ID, GH_APP_PRIVATE_KEY
#   MYSQL_ADMIN_PASSWORD   — MySQL administrator password (sensitive)
#   TF_API_TOKEN           — HCP Terraform user/team API token
#
#   TF_CLOUD_ORGANIZATION  — HCP Terraform organization name
# ============================================================================

name: "3 · Apply / Destroy (main)"

on:
  push:
    branches:
    - main
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: plan-only
        type: choice
        options:
        - plan-only
        - apply
        - destroy
      confirm_destroy:
        description: "Type 'destroy' to confirm (required when action is destroy)"
        required: false
        type: string
        default: ""
      reason:
        description: "Reason for this manual run (required for apply and destroy)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

# ============================================================================
# JOB 1 — plan
# Skipped when action is 'destroy' (destroy runs independently).
# ============================================================================
jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action != 'destroy'

    outputs:
      exit_code: ${{ steps.plan.outputs.exit_code }}

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_VAR_mysql_admin_password: ${{ secrets.MYSQL_ADMIN_PASSWORD }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "~1.5"
        terraform_wrapper: false

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Generate GitHub App Token
      id: app-token
      uses: actions/create-github-app-token@v3.1.1
      with:
        client-id: ${{ secrets.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
        owner: Terraform-Modules-Internal

    - name: Configure Git credentials
      run: |
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

    - name: Terraform Init
      run: terraform init -upgrade

    - name: Terraform Plan
      id: plan
      timeout-minutes: 10
      run: |
        set +e
        terraform plan \
          -no-color \
          -detailed-exitcode \
          -lock-timeout=60s \
          -input=false \
          2>&1 | tee "${{ github.workspace }}/plan.txt"
        echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        set -e
      continue-on-error: true

    - name: Publish plan to Step Summary
      run: |
        EXIT="${{ steps.plan.outputs.exit_code }}"
        case "$EXIT" in
          0) STATUS="✅ No changes — infrastructure is up to date" ;;
          1) STATUS="❌ Plan failed — review errors below"         ;;
          2) STATUS="⚠️  Changes detected — dispatch 'apply' to proceed" ;;
          *) STATUS="Exit code: $EXIT" ;;
        esac

        {
          echo "## Terraform Plan — ${STATUS}"
          echo ""
          echo "| Field  | Value |"
          echo "|--------|-------|"
          echo "| Commit | \`${{ github.sha }}\` |"
          echo "| Actor  | ${{ github.actor }} |"
          echo "| Ref    | \`${{ github.ref_name }}\` |"
          echo ""
          echo "<details><summary>Full plan output</summary>"
          echo ""
          echo '```hcl'
          cat "${{ github.workspace }}/plan.txt"
          echo '```'
          echo "</details>"
          echo ""
          echo "> To apply: Actions → **3 · Apply / Destroy (main)** → Run workflow → action: **apply**"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Fail if plan errored
      if: steps.plan.outputs.exit_code == '1'
      run: |
        echo "=== Terraform plan output ==="
        cat "${{ github.workspace }}/plan.txt"
        echo "::error::Terraform plan failed. The apply job will not run."
        exit 1

  # ============================================================================
  # JOB 2 — apply
  # Runs only when manually dispatched with action: apply AND plan has changes.
  # The explicit dispatch is the manual approval gate.
  # ============================================================================
  apply:
    name: Terraform Apply
    needs: plan
    environment: production
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_VAR_mysql_admin_password: ${{ secrets.MYSQL_ADMIN_PASSWORD }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "~1.5"
        terraform_wrapper: false

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Generate GitHub App Token
      id: app-token
      uses: actions/create-github-app-token@v3.1.1
      with:
        client-id: ${{ secrets.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
        owner: Terraform-Modules-Internal

    - name: Configure Git credentials
      run: |
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

    - name: Terraform Init
      run: terraform init -upgrade

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false

    - name: Publish apply result to Step Summary
      if: always()
      run: |
        RESULT="${{ job.status }}"
        case "$RESULT" in
          success) ICON="✅" ;;
          failure) ICON="❌" ;;
          *)       ICON="⚠️" ;;
        esac

        {
          echo "## Terraform Apply — ${ICON} ${RESULT^}"
          echo ""
          echo "| Field        | Value |"
          echo "|--------------|-------|"
          echo "| Commit       | \`${{ github.sha }}\` |"
          echo "| Approved by  | ${{ github.actor }} |"
          echo "| Reason       | ${{ github.event.inputs.reason }} |"
          echo "| Run          | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
        } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # JOB 3 — destroy
  # DESTRUCTIVE. Runs only when manually dispatched with action: destroy AND
  # confirm_destroy is exactly "destroy". Plan job is skipped in this path.
  # ============================================================================
  destroy:
    name: Terraform Destroy
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_VAR_mysql_admin_password: ${{ secrets.MYSQL_ADMIN_PASSWORD }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}

    steps:
    # Abort immediately if the typed confirmation is wrong.
    - name: Confirm destroy
      run: |
        if [ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]; then
          echo "::error::confirm_destroy must be exactly 'destroy'. Got: '${{ github.event.inputs.confirm_destroy }}'"
          exit 1
        fi
        echo "Destroy confirmed by ${{ github.actor }}"

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "~1.5"
        terraform_wrapper: false

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Generate GitHub App Token
      id: app-token
      uses: actions/create-github-app-token@v3.1.1
      with:
        client-id: ${{ secrets.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
        owner: Terraform-Modules-Internal

    - name: Configure Git credentials
      run: |
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

    - name: Terraform Init
      run: terraform init -upgrade

    - name: Terraform Destroy
      timeout-minutes: 30
      run: |
        terraform destroy \
          -auto-approve \
          -no-color \
          -lock-timeout=60s

    - name: Publish destroy result to Step Summary
      if: always()
      run: |
        RESULT="${{ job.status }}"
        case "$RESULT" in
          success) ICON="✅" ;;
          failure) ICON="❌" ;;
          *)       ICON="⚠️" ;;
        esac

        {
          echo "## Terraform Destroy — ${ICON} ${RESULT^}"
          echo ""
          echo "| Field        | Value |"
          echo "|--------------|-------|"
          echo "| Triggered by | ${{ github.actor }} |"
          echo "| Reason       | ${{ github.event.inputs.reason }} |"
          echo "| Commit       | \`${{ github.sha }}\` |"
          echo "| Ref          | \`${{ github.ref_name }}\` |"
          echo "| Run          | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
        } >> "$GITHUB_STEP_SUMMARY"
