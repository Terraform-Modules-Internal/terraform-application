# ============================================================================
# Workflow 3 — Terraform Apply (Post-merge to main)
#
# Triggered when a commit lands on `main` (post-PR merge) or manually via
# workflow_dispatch.
#
# Pipeline shape
# ──────────────
#
#   ┌──────────────────┐     tfplan artifact      ┌────────────────────────────┐
#   │   Job: plan      │ ─────────────────────── ▶ │   Job: apply               │
#   │  (runs always)   │                           │   environment: production  │
#   └──────────────────┘                           │   ← approval required      │
#                                                  └────────────────────────────┘
#
# Approval gate
# ─────────────
# The `apply` job targets the GitHub Environment named `production`.
# GitHub pauses execution and sends approval notifications to all required
# reviewers configured on that environment.  Reviewers should read the plan
# published to the Step Summary before approving.
#
# Configure reviewers:
#   Repository → Settings → Environments → production → Required reviewers
#
# Concurrency
# ───────────
# A concurrency group prevents two apply runs from racing on the same branch.
# cancel-in-progress is false because interrupting a running apply could leave
# infrastructure in a partially-changed state.
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#   AZURE_KEYVAULT_NAME
#
# Required Azure Key Vault secrets:
#   ARM-CLIENT-ID, ARM-CLIENT-SECRET, ARM-TENANT-ID, ARM-SUBSCRIPTION-ID
#
# Required GitHub Environment:
#   production — configure required reviewers in repository settings
# ============================================================================

name: "3 · Apply (main)"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false  # never interrupt an in-progress apply

# ============================================================================
# JOB 1 — plan
# Generates the execution plan, writes a human-readable summary to the
# workflow Step Summary (visible before approval), and uploads the binary
# plan file as a short-lived artifact for the apply job.
# ============================================================================
jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    outputs:
      exit_code: ${{ steps.plan.outputs.exit_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Terraform credentials from Key Vault
        run: |
          fetch_and_mask() {
            local kv_secret="$1"
            local env_var="$2"
            local value
            value=$(az keyvault secret show \
              --vault-name "${{ secrets.AZURE_KEYVAULT_NAME }}" \
              --name  "$kv_secret" \
              --query value \
              --output tsv)
            echo "::add-mask::$value"
            echo "${env_var}=${value}" >> "$GITHUB_ENV"
          }

          fetch_and_mask "ARM-CLIENT-ID"       "ARM_CLIENT_ID"
          fetch_and_mask "ARM-CLIENT-SECRET"   "ARM_CLIENT_SECRET"
          fetch_and_mask "ARM-TENANT-ID"       "ARM_TENANT_ID"
          fetch_and_mask "ARM-SUBSCRIPTION-ID" "ARM_SUBSCRIPTION_ID"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan \
            -no-color \
            -detailed-exitcode \
            -out="${{ github.workspace }}/tfplan" \
            2>&1 | tee "${{ github.workspace }}/plan.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e
        continue-on-error: true

      # Publish the plan to the Step Summary so approvers can read it from
      # the workflow run page when deciding whether to approve the apply job.
      - name: Publish plan to Step Summary
        run: |
          EXIT="${{ steps.plan.outputs.exit_code }}"
          case "$EXIT" in
            0) STATUS="✅ No changes — infrastructure is up to date" ;;
            1) STATUS="❌ Plan failed — review errors below"         ;;
            2) STATUS="⚠️  Changes detected — review before approving apply" ;;
            *) STATUS="Exit code: $EXIT" ;;
          esac

          {
            echo "## Terraform Plan — ${STATUS}"
            echo ""
            echo "| Field  | Value |"
            echo "|--------|-------|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Actor  | ${{ github.actor }} |"
            echo "| Ref    | \`${{ github.ref_name }}\` |"
            echo ""
            echo "<details><summary>Full plan output</summary>"
            echo ""
            echo '```hcl'
            cat "${{ github.workspace }}/plan.txt"
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        if: steps.plan.outputs.exit_code != '1'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: tfplan
          retention-days: 1   # keep only long enough for approval + apply

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::Terraform plan failed. The apply job will not run."
          exit 1

  # ============================================================================
  # JOB 2 — apply
  # Downloads the saved plan and applies it.
  #
  # The `environment: production` directive causes GitHub Actions to pause this
  # job and wait for approval from the required reviewers configured on the
  # `production` environment.  Reviewers see the plan in the Step Summary of
  # the plan job before clicking Approve.
  # ============================================================================
  apply:
    name: Terraform Apply
    needs: plan
    # Only run when the plan found real changes to apply.
    if: needs.plan.outputs.exit_code == '2'
    runs-on: ubuntu-latest

    # ── APPROVAL GATE ────────────────────────────────────────────────────────
    # GitHub pauses here, notifies required reviewers, and waits for approval.
    # Configure reviewers: Settings → Environments → production → Required reviewers
    environment: production
    # ─────────────────────────────────────────────────────────────────────────

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Terraform credentials from Key Vault
        run: |
          fetch_and_mask() {
            local kv_secret="$1"
            local env_var="$2"
            local value
            value=$(az keyvault secret show \
              --vault-name "${{ secrets.AZURE_KEYVAULT_NAME }}" \
              --name  "$kv_secret" \
              --query value \
              --output tsv)
            echo "::add-mask::$value"
            echo "${env_var}=${value}" >> "$GITHUB_ENV"
          }

          fetch_and_mask "ARM-CLIENT-ID"       "ARM_CLIENT_ID"
          fetch_and_mask "ARM-CLIENT-SECRET"   "ARM_CLIENT_SECRET"
          fetch_and_mask "ARM-TENANT-ID"       "ARM_TENANT_ID"
          fetch_and_mask "ARM-SUBSCRIPTION-ID" "ARM_SUBSCRIPTION_ID"

      # Re-initialise to restore providers and modules.  The pinned lock file
      # (.terraform.lock.hcl) ensures the same provider versions as the plan.
      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ github.workspace }}

      # -auto-approve is safe here: human approval was collected via the
      # environment gate above.  The saved plan is applied exactly — no drift.
      - name: Terraform Apply
        run: terraform apply -auto-approve "${{ github.workspace }}/tfplan"

      - name: Publish apply result to Step Summary
        if: always()
        run: |
          RESULT="${{ job.status }}"
          case "$RESULT" in
            success) ICON="✅" ;;
            failure) ICON="❌" ;;
            *)       ICON="⚠️" ;;
          esac

          {
            echo "## Terraform Apply — ${ICON} ${RESULT^}"
            echo ""
            echo "| Field    | Value |"
            echo "|----------|-------|"
            echo "| Commit   | \`${{ github.sha }}\` |"
            echo "| Approved by | ${{ github.actor }} |"
            echo "| Run      | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
