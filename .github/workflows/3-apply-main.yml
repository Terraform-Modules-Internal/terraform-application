# ============================================================================
# Workflow 3 — Terraform Apply (Post-merge to main)
#
# Triggered when a commit lands on `main` (post-PR merge) or manually via
# workflow_dispatch.
#
# Pipeline shape
# ──────────────
#
#   ┌──────────────────┐     tfplan artifact      ┌────────────────────────────┐
#   │   Job: plan      │ ─────────────────────── ▶ │   Job: apply               │
#   │  (runs always)   │                           │   environment: production  │
#   └──────────────────┘                           │   ← approval required      │
#                                                  └────────────────────────────┘
#
# Approval gate
# ─────────────
# The `apply` job targets the GitHub Environment named `production`.
# GitHub pauses execution and sends approval notifications to all required
# reviewers configured on that environment.  Reviewers should read the plan
# published to the Step Summary before approving.
#
# Configure reviewers:
#   Repository → Settings → Environments → production → Required reviewers
#
# Authentication strategy
# ────────────────────────
# Azure App Registration with Federated Identity Credentials (OIDC) is used
# for both the Azure CLI login and the Terraform azurerm provider.
# No client secrets are required, stored, or transmitted.
#
# How it works:
#   1. `id-token: write` permission lets GitHub issue a short-lived OIDC JWT.
#   2. azure/login@v2 exchanges the JWT for an Azure CLI access token.
#   3. The azurerm provider reads ARM_USE_OIDC=true and independently
#      exchanges its own OIDC token for an Azure Resource Manager token.
#
# Concurrency
# ───────────
# A concurrency group prevents two apply runs from racing on the same branch.
# cancel-in-progress is false because interrupting a running apply could leave
# infrastructure in a partially-changed state.
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#
# Azure prerequisites:
#   - App Registration with Federated Credentials for:
#       • repo push on main  (plan + apply jobs)
#       • pull_request       (if workflow_dispatch targets main)
#   - Contributor (or scoped) role on the target subscription/RG
#
# Required GitHub Environment:
#   production — configure required reviewers in repository settings
# ============================================================================

name: "3 · Apply (main)"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false  # never interrupt an in-progress apply

# ============================================================================
# JOB 1 — plan
# Generates the execution plan, writes a human-readable summary to the
# workflow Step Summary (visible before approval), and uploads the binary
# plan file as a short-lived artifact for the apply job.
# ============================================================================
jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    outputs:
      exit_code: ${{ steps.plan.outputs.exit_code }}

    # ── Terraform ARM authentication via OIDC ────────────────────────────────
    # ARM_USE_OIDC instructs the azurerm provider to obtain a short-lived
    # access token via the GitHub OIDC endpoint instead of a client secret.
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      # ── Azure CLI login via OIDC ──────────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Terraform-Modules-Internal

      - name: Configure Git credentials
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        timeout-minutes: 10
        run: |
          set +e
          terraform plan \
            -no-color \
            -detailed-exitcode \
            -lock-timeout=60s \
            -out="${{ github.workspace }}/tfplan" \
            2>&1 | tee "${{ github.workspace }}/plan.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e
        continue-on-error: true

      # Publish the plan to the Step Summary so approvers can read it from
      # the workflow run page when deciding whether to approve the apply job.
      - name: Publish plan to Step Summary
        run: |
          EXIT="${{ steps.plan.outputs.exit_code }}"
          case "$EXIT" in
            0) STATUS="✅ No changes — infrastructure is up to date" ;;
            1) STATUS="❌ Plan failed — review errors below"         ;;
            2) STATUS="⚠️  Changes detected — review before approving apply" ;;
            *) STATUS="Exit code: $EXIT" ;;
          esac

          {
            echo "## Terraform Plan — ${STATUS}"
            echo ""
            echo "| Field  | Value |"
            echo "|--------|-------|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Actor  | ${{ github.actor }} |"
            echo "| Ref    | \`${{ github.ref_name }}\` |"
            echo ""
            echo "<details><summary>Full plan output</summary>"
            echo ""
            echo '```hcl'
            cat "${{ github.workspace }}/plan.txt"
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        if: steps.plan.outputs.exit_code != '1'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: tfplan
          retention-days: 1   # keep only long enough for approval + apply

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::Terraform plan failed. The apply job will not run."
          exit 1

  # ============================================================================
  # JOB 2 — apply
  # Downloads the saved plan and applies it.
  #
  # The `environment: production` directive causes GitHub Actions to pause this
  # job and wait for approval from the required reviewers configured on the
  # `production` environment.  Reviewers see the plan in the Step Summary of
  # the plan job before clicking Approve.
  # ============================================================================
  apply:
    name: Terraform Apply
    needs: plan
    # Only run when the plan found real changes to apply.
    if: needs.plan.outputs.exit_code == '2'
    runs-on: ubuntu-latest

    # ── APPROVAL GATE ────────────────────────────────────────────────────────
    # GitHub pauses here, notifies required reviewers, and waits for approval.
    # Configure reviewers: Settings → Environments → production → Required reviewers
    environment: production
    # ─────────────────────────────────────────────────────────────────────────

    # ── Terraform ARM authentication via OIDC ────────────────────────────────
    # Each job must re-declare env vars — job-level env does not inherit across jobs.
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      # ── Azure CLI login via OIDC ──────────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Terraform-Modules-Internal

      - name: Configure Git credentials
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      # Re-initialise to restore providers and modules.  The pinned lock file
      # (.terraform.lock.hcl) ensures the same provider versions as the plan.
      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ github.workspace }}

      # -auto-approve is safe here: human approval was collected via the
      # environment gate above.  The saved plan is applied exactly — no drift.
      - name: Terraform Apply
        run: terraform apply -auto-approve "${{ github.workspace }}/tfplan"

      - name: Publish apply result to Step Summary
        if: always()
        run: |
          RESULT="${{ job.status }}"
          case "$RESULT" in
            success) ICON="✅" ;;
            failure) ICON="❌" ;;
            *)       ICON="⚠️" ;;
          esac

          {
            echo "## Terraform Apply — ${ICON} ${RESULT^}"
            echo ""
            echo "| Field    | Value |"
            echo "|----------|-------|"
            echo "| Commit   | \`${{ github.sha }}\` |"
            echo "| Approved by | ${{ github.actor }} |"
            echo "| Run      | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
